name: Universal Architecture Tests

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov
    
    - name: Create test directories
      run: |
        mkdir -p workflows
        mkdir -p plugins
        mkdir -p test-workspace
    
    - name: Copy example configs for testing
      run: |
        cp examples/workflows/example-workflows.yaml workflows/
        cp examples/configs/zealot-config.yaml zealot-config.test.yaml
    
    - name: Run import tests
      run: |
        export PYTHONPATH="${PYTHONPATH}:$PWD/src"
        python -c "from zealot.universal_engine import UniversalZealotEngine"
        python -c "from zealot.workflows.schema import Workflow, WorkflowLoader"
        python -c "from zealot.plugins.interface import ZealotPlugin, PluginManager"
        python -c "from zealot.adapters.base import IssueAdapter, VCSAdapter"
    
    - name: Run unit tests
      run: |
        export PYTHONPATH="${PYTHONPATH}:$PWD/src"
        pytest tests/test_universal_architecture.py -v || true
    
    - name: Run verification script
      run: |
        export PYTHONPATH="${PYTHONPATH}:$PWD/src"
        python tests/verify_universal_architecture.py

  integration:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Setup test environment
      run: |
        cp examples/configs/zealot-config.yaml zealot-config.test.yaml
        mkdir -p workflows
        cp examples/workflows/example-workflows.yaml workflows/
        
    - name: Run integration test
      env:
        ZEALOT_ISSUE_TYPE: mock
        ZEALOT_VCS_TYPE: mock
        ZEALOT_LLM_PROVIDER: mock
        ZEALOT_CONTAINER_TYPE: mock
        PYTHONPATH: "$PWD/src"
      run: |
        python tests/manual_test_universal.py || true
