name: Universal Architecture Tests

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install minimal dependencies
      run: |
        python -m pip install --upgrade pip
        # Only install what's absolutely needed for imports
        pip install pyyaml structlog
    
    - name: Create test directories
      run: |
        mkdir -p workflows
        mkdir -p plugins
        mkdir -p test-workspace
    
    - name: Copy example configs for testing
      run: |
        cp examples/workflows/example-workflows.yaml workflows/
        cp examples/configs/zealot-config.yaml zealot-config.test.yaml
    
    - name: Run simple file structure test
      run: |
        python tests/test_ci_simple.py
    
    - name: Test basic imports
      run: |
        export PYTHONPATH="${PYTHONPATH}:$PWD/src"
        python -c "
import sys
sys.path.insert(0, 'src')
# Test that modules exist (without importing dependencies)
import os
print('Checking module files...')
modules = [
    'src/zealot/universal_config.py',
    'src/zealot/universal_engine.py',
    'src/zealot/workflows/schema.py',
    'src/zealot/plugins/interface.py',
    'src/zealot/adapters/base.py',
]
for m in modules:
    if os.path.exists(m):
        print(f'✓ {m}')
    else:
        print(f'✗ {m}')
        sys.exit(1)
print('All modules found!')
"

  integration:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Verify integration files
      run: |
        echo "Checking integration test files..."
        test -f examples/configs/zealot-config.yaml && echo "✓ Config example exists" || exit 1
        test -f examples/workflows/example-workflows.yaml && echo "✓ Workflow examples exist" || exit 1
        echo "✓ All integration files present"
